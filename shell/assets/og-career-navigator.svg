<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">SMART CAREER Navigator Open Graph Preview</title>
  <desc id="desc">Editorialer Social Preview für die CareerSuite-Landingpage mit Dashboard- und Prozesskarten.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f1e7"/>
      <stop offset="100%" stop-color="#e9f0f6"/>
    </linearGradient>
    <linearGradient id="ink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1f3a"/>
      <stop offset="55%" stop-color="#1f446b"/>
      <stop offset="100%" stop-color="#b8882a"/>
    </linearGradient>
    <linearGradient id="darkPanel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#091a31"/>
      <stop offset="100%" stop-color="#17395c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0b1f3a" flood-opacity="0.18"/>
    </filter>
  </defs>
