<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Widerruf | Risiko Register</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#e1e8ee;--panel:#fff;--line:#aebcca;--text:#08131d;--muted:#304252;--brand:#163f63;--brand-dark:#091f33;--shadow:0 18px 36px rgba(10,23,36,.12);}
    *{box-sizing:border-box} body{margin:0;font-family:'Source Sans 3',sans-serif;color:var(--text);background:linear-gradient(180deg,rgba(22,63,99,.1),transparent 240px),var(--bg);min-height:100vh;padding:24px}
    .card{max-width:980px;margin:0 auto;background:var(--panel);border:1px solid rgba(22,63,99,.1);border-radius:20px;box-shadow:var(--shadow);padding:28px}
    .eyebrow{font-size:.82rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700}
    h1{font-family:'DM Serif Display',serif;font-size:clamp(2rem,4vw,3rem);margin:.35rem 0 1rem;color:var(--brand-dark)}
    p{line-height:1.6;margin:0 0 1rem}
    .home{display:inline-flex;align-items:center;gap:.5rem;margin-top:1rem;color:var(--brand);font-weight:700;text-decoration:none}
    .home:hover{text-decoration:underline}
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Rechtliches</div>
    <h1>Widerruf</h1>
    <p>Hier wird die Widerrufsbelehrung für die Verkaufsversion ergänzt.</p>
    <p>Die Seite ist als eigene Zielseite vorbereitet, damit sie im Footer der App jederzeit direkt erreichbar ist.</p>
    <a class="home" href="./index.html">Zur App zurück</a>
  </main>
</body>
</html>
